<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Para ti 💚</title>
    <link rel="icon" href="icon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>

<body>

    <div id="fake-form">
        <h2>Antes de continuar…</h2>
        <p>Necesito que ingreses tu edad y algunos datos personales 😳</p>

        <input id="fake-input" type="text" placeholder="Escribe aquí...">
        <div class="botones">
            <button id="cancelar-btn" class="fake-btn">Cancelar</button>
            <button id="fake-btn" class="fake-btn">Enviar</button>
        </div>

        <p id="fake-msg"></p>
    </div>

    <div id="heart-container"></div>

    <div id="phrases-container"></div>

    <audio id="music" autoplay loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div id="game-ui" style="display:none;">
        <div id="score-display">0 / 100</div>
        <div id="score-bar">
            <div id="score-fill"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
